<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Clever | Log in</title>
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAwAAAANCAIAAAASSxgVAAABqUlEQVR4nBSRQWsUQRCF6/X0dByXFTdqokZMNLkYsgoiay4eIogXRdCDoPgbFDz7A8SbFy8ePOi/8CQYQtSwhyW4GxQPJiOuWTTJrpOe7qrU3PrRVa++qmeXHu+BiYRCiViKEVEZAyBIQRDmaCxYH6TfYymfmpCpcXGW8j7yHP92YRjaZkWIA51sxAc3cWfJEdnKlmS951++iV97iVrbcl+O1/npw6TVzH5shvZ6EQPNzSRz027+/KjbFYlk1W1xgVrNQ93v/vnrot2xHDF7xs/PxtU1FzxcIraeyWLThEAfPpVrnXTqmFLTYNu+/5lmTrRCFMsCkw0oRH+baw7eiy+g/kfrbEhnAVFM9NIfKCkmxs1oqK1IrcQSgz+IvlpN68zODlbabC2utdLLF8o8l9+/qJaFe7f9kRrvj/RUUmEuf5HPV/9fuZg9e2LaHR8jnZt2lxbsicbw7btEXW2aKKZ58So+uju8dWNs5uxhIk2AV1aLj8vgkpQM1+/vKX/wnDk6rRefZAPZ2kryTez+pcRApdVMNKzUoBjRRg/fNipZIYNSC92PBQcAAAD//3CcGhwAAAAGSURBVAMAyfHjzgCunJ0AAAAASUVORK5CYII=">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0b0d14;--surface:#12151f;--border:#1e2235;--accent:#4f6ef7;--accent2:#7c3aed;--text:#e2e8f0;--muted:#64748b;--danger:#ef4444;--success:#22c55e;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,110,247,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(79,110,247,.07) 1px,transparent 1px);background-size:48px 48px;animation:gridScroll 24s linear infinite;pointer-events:none;z-index:0;}
    @keyframes gridScroll{0%{background-position:0 0}100%{background-position:48px 48px}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
    .orb1{width:420px;height:420px;background:rgba(79,110,247,.18);top:-100px;left:-100px;animation:orbPulse 8s ease-in-out infinite;}
    .orb2{width:360px;height:360px;background:rgba(124,58,237,.14);bottom:-80px;right:-80px;animation:orbPulse 10s ease-in-out infinite reverse;}
    @keyframes orbPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.15);opacity:1}}
    .panel{position:relative;z-index:10;width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px 36px;box-shadow:0 0 0 1px rgba(79,110,247,.08),0 32px 64px rgba(0,0,0,.6);animation:panelIn .5s cubic-bezier(.22,.68,0,1.2) both;}
    @keyframes panelIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
    .logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 20px rgba(79,110,247,.4);}
    .logo-text{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;letter-spacing:.03em;line-height:1.2;}
    .logo-text span{display:block;font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.06em;}
    label{display:block;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
    .field{margin-bottom:16px;}
    input[type="password"]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:14px;transition:border-color .2s,box-shadow .2s;outline:none;}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,.15);}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.02em;margin-top:8px;position:relative;overflow:hidden;transition:opacity .2s,transform .15s;box-shadow:0 0 24px rgba(79,110,247,.35);}
    .btn:hover{opacity:.92;transform:translateY(-1px);}
    .btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shimmer 2.5s infinite;}
    @keyframes shimmer{0%{left:-100%}100%{left:200%}}
    .error-msg{color:var(--danger);font-size:13px;min-height:20px;margin-top:10px;text-align:center;}
    .hint{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center;line-height:1.6;}
    .hint kbd{background:var(--border);color:var(--text);border-radius:4px;padding:1px 6px;font-family:'Space Mono',monospace;font-size:11px;}
    .success-state{text-align:center;}
    .success-state h2{font-family:'Space Mono',monospace;font-size:18px;margin-bottom:8px;}
    .pulse-dot{display:inline-block;width:10px;height:10px;background:var(--success);border-radius:50%;margin-right:8px;animation:pulseDot 1.5s ease-out infinite;}
    @keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="panel" id="panel">
  <div class="logo-row">
    <div class="logo-icon">&#9889;</div>
    <div class="logo-text">SCRAMJET GATEWAY<span>BROWSER ENGINE v2.0</span></div>
  </div>
  <div class="field">
    <label>Access Key</label>
    <input type="password" id="accessKey" placeholder="Enter your access key" autocomplete="off"/>
  </div>
  <button class="btn" id="loginBtn">LAUNCH GATEWAY &rarr;</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="hint">Opens in isolated tab &middot; Press <kbd>~</kbd> to exit to Clever</div>
</div>

<script>
  // ============================================================
  //  OWNER-CONFIGURABLE ACCESS KEYS — edit before deploying
  // ============================================================
  var ACCESS_KEYS = [
    "gateway-alpha-2024",
    "gateway-beta-key",
    "demo1234"
  ];

  var CLEVER_URL = "https://clever.com/oauth/authorize?channel=clever&client_id=4c63c1cf623dce82caac&confirmed=true&redirect_uri=https%3A%2F%2Fclever.com%2Fin%2Fauth_callback&response_type=code&state=72ebd98f122166e9e516fb2c8aae1f8085300648e43a91970179fc4dc8cd1827&district_id=5d4d9facff76bc000146dc2c";

  // This is your Cloudflare Pages URL — update if it changes
  var PROXY_PAGE = location.origin + "/gateway.html";

  function validate(key) {
    return ACCESS_KEYS.indexOf(key.trim()) !== -1;
  }

  function launch() {
    var key = document.getElementById("accessKey").value;
    var err = document.getElementById("errorMsg");
    var inp = document.getElementById("accessKey");

    if (!validate(key)) {
      err.textContent = "Invalid access key. Contact your administrator.";
      inp.style.borderColor = "var(--danger)";
      return;
    }

    err.textContent = "";
    inp.style.borderColor = "";

    // Open proxy.html in a new tab — real https:// origin, not about:blank
    var popup = window.open(PROXY_PAGE, "_blank",
      "width=1280,height=820,menubar=no,toolbar=no,location=no,status=no,scrollbars=yes");

    if (!popup) {
      err.textContent = "Popup blocked — please allow popups for this page.";
      return;
    }

    // Update launcher to success state
    document.getElementById("panel").innerHTML =
        "<div class='logo-row'>"
      + "<div class='logo-icon'>&#9889;</div>"
      + "<div class='logo-text'>SCRAMJET GATEWAY<span>ENGINE ACTIVE</span></div>"
      + "</div>"
      + "<div class='success-state'>"
      + "<h2><span class='pulse-dot'></span>Gateway running</h2>"
      + "<p style='margin-top:12px;color:var(--muted);font-size:14px;line-height:1.7'>"
      + "The gateway is active in your new tab.<br><br>"
      + "Press <kbd style='background:var(--border);border-radius:4px;padding:1px 6px;"
      + "font-family:monospace;font-size:11px'>~</kbd> inside to exit to Clever.</p>"
      + "</div>";
  }

  document.getElementById("loginBtn").addEventListener("click", launch);
  document.getElementById("accessKey").addEventListener("keydown", function(e) {
    if (e.key === "Enter") launch();
  });
</script>
</body>
</html>
